name: CI

# Enforces the "green test + green lint" baseline that CLAUDE.md §3.2/§3.3
# mandates, on every push and every PR. The structured-prompt workflow drops
# medium-sized PRs frequently; CI catches regressions before they land on main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel earlier in-flight runs for the same ref (e.g. force-push on a PR) so
# we don't burn minutes on stale code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Match the pyproject floor (`requires-python = ">=3.11"`,
      # `target-version = "py311"`). Local dev may run a newer interpreter; CI
      # is what defines the support contract.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: blood-hunt-companion/apps/api/pyproject.toml

      - name: Install api package + dev extras
        working-directory: blood-hunt-companion
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"

      # Lint and test run sequentially in one job — total wall time is
      # ~30s setup + ~5s ruff + ~30s mypy + ~15s pytest, comfortably under
      # one minute. Splitting into parallel jobs would double the setup
      # overhead without meaningful speedup.
      - name: Ruff
        working-directory: blood-hunt-companion
        run: ruff check apps/api tools

      - name: Mypy (strict)
        working-directory: blood-hunt-companion/apps/api
        run: mypy app

      # Tesseract isn't installed on the runner — `pytest.importorskip` in the
      # OCR-fixture test family skips cleanly when the binary is absent, so
      # this matches local behavior (164 passed + N skipped).
      - name: Pytest
        working-directory: blood-hunt-companion
        run: pytest apps/api/tests
